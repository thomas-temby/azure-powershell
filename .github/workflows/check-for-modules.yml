name: pr-new-modules
run-name: Triggered by pr
env:
  GH_TOKEN: ${{ github.token }}
  PR: ${{ github.event.pull_request.html_url }}
on:
  pull_request_target:
    types:
      - opened
      - edited
jobs:
  process_labels:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: |
          .github
    - name: check for new modules
      shell: pwsh
      env:
        BASE_REF: ${{ github.base_ref }}
        HEAD_REF: ${{ github.head_ref }}
      run: echo "::notice title=Check for new modules::Checking for new modules in the PR $env:BASE_REF | $env:REF | $env:PR"
